name: Deploy to GitHub Pages (disabled — we use Cloudflare Pages now)

# Production site is served by Cloudflare Pages on italycare360.com.
# This workflow is kept for historical reasons but no longer runs automatically.
# If you ever need to fall back to GitHub Pages: re-add public/CNAME and
# uncomment the "push" trigger below.
on:
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # Custom domain (italycare360.com) is served from the root path.
          # public/CNAME instructs GitHub Pages to use that domain.
          # If you ever revert to the github.io URL, uncomment the next line:
          # NEXT_PUBLIC_BASE_PATH: /ITALYCARE-360
          NEXT_PUBLIC_BASE_PATH: ''
          # Google Analytics 4 — add NEXT_PUBLIC_GA_ID in GitHub repo Secrets
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          # AI Chat Worker URL — add CHAT_WORKER_URL after deploying the Cloudflare Worker
          # See /worker/README.md for deployment instructions
          NEXT_PUBLIC_CHAT_WORKER_URL: ${{ secrets.CHAT_WORKER_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
